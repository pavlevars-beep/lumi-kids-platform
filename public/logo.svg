<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0277BD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03A9F4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rocket -->
  <g transform="translate(8, 18) scale(0.55)">
    <ellipse cx="30" cy="50" rx="14" ry="35" fill="#FF9E3D"/>
    <polygon points="30,5 16,30 44,30" fill="#FF4B4B"/>
    <circle cx="30" cy="52" r="8" fill="#0277BD"/>
    <circle cx="30" cy="52" r="5" fill="#03A9F4"/>
    <polygon points="16,65 8,80 22,72" fill="#FF9E3D"/>
    <polygon points="44,65 52,80 38,72" fill="#FF9E3D"/>
    <ellipse cx="30" cy="82" rx="8" ry="5" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- LUMI text -->
  <text x="55" y="58" font-family="'Bubblegum Sans', Arial Rounded MT Bold, Arial, sans-serif" font-size="38" font-weight="bold" letter-spacing="1">
    <tspan fill="#FF4B4B">L</tspan><tspan fill="#FF9E3D">u</tspan><tspan fill="#FFD700">m</tspan><tspan fill="#8BC34A">i</tspan>
  </text>
  <!-- KIDS text -->
  <text x="140" y="58" font-family="'Bubblegum Sans', Arial Rounded MT Bold, Arial, sans-serif" font-size="38" font-weight="bold" letter-spacing="1">
    <tspan fill="#0277BD">K</tspan><tspan fill="#03A9F4">i</tspan><tspan fill="#0277BD">d</tspan><tspan fill="#03A9F4">s</tspan>
  </text>

  <!-- STUDIO ribbon -->
  <rect x="55" y="65" width="195" height="24" rx="5" fill="#0277BD"/>
  <text x="152" y="82" font-family="'Bubblegum Sans', Arial Rounded MT Bold, Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">STUDIO</text>

  <!-- Stars -->
  <text x="256" y="38" font-size="14" fill="#FFD700">★</text>
  <text x="272" y="55" font-size="10" fill="#8BC34A">★</text>
  <text x="262" y="62" font-size="8" fill="#FF9E3D">✦</text>
</svg>
